<h2>评估报告详细程度</h2>
<p class="subtitle">选择你希望看到的信息粒度</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>汇总 + 明细</h3>
      <p>顶部显示平均指标，下方表格列出每个问题的详细结果（query、recall、faithfulness、answer）</p>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>仅汇总</h3>
      <p>只显示平均指标和分布图，不展示每个问题的明细</p>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>汇总 + 明细 + 检索内容</h3>
      <p>在 A 的基础上，点击某个问题可以展开看到检索到的 chunk 内容和 LLM 生成的回答</p>
    </div>
  </div>
</div>
